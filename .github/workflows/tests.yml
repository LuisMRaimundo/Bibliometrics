name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,enrichment]"
      - name: Ruff
        run: ruff check bibliometric_analysis tests metrics
      - name: Pytest
        run: pytest tests/ -q --cov=bibliometric_analysis --cov=metrics --cov-report=term-missing
